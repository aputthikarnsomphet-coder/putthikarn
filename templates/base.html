<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}putthikarn - Portfolio{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=IBM+Plex+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="logo">putthikarn</div>
            <ul class="nav-menu">
                <li><a href="{{ url_for('home') }}" class="nav-link">หน้าหลัก</a></li>
                <li><a href="{{ url_for('about') }}" class="nav-link">เกี่ยวกับตัวฉัน</a></li>
                <li><a href="{{ url_for('portfolio') }}" class="nav-link">ผลงาน</a></li>
                <li><a href="{{ url_for('contact') }}" class="nav-link">ติดต่อ</a></li>
            </ul>
        </div>
    </nav>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 putthikarn - {{ data.name }}. All rights reserved.</p>
            <div class="social-links">
                <a href="{{ data.github }}" target="_blank">GitHub</a>
                <a href="mailto:{{ data.email }}">Email</a>
            </div>
        </div>
    </footer>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
